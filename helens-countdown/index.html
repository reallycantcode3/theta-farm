<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>helen's personal fl countdown ✨</title>
<meta name="description" content="counting down to june 30 · 6:51pm ET — helen's personal FL countdown 🌴🔥" />
<meta property="og:title" content="helen's personal fl countdown ✨" />
<meta property="og:description" content="the official countdown till june 30 · 6:51pm 🌴🔥💅" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Fredoka:wght@500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --hot:#ff2d95;
    --yellow:#ffe300;
    --lime:#caff00;
    --cyan:#00e5ff;
    --purple:#9b5cff;
    --ink:#160033;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Space Grotesk',system-ui,sans-serif;
    color:var(--ink);
    min-height:100vh;
    overflow-x:hidden;
    background:
      radial-gradient(circle at 12% 18%, rgba(255,45,149,.55), transparent 40%),
      radial-gradient(circle at 88% 12%, rgba(0,229,255,.55), transparent 42%),
      radial-gradient(circle at 78% 88%, rgba(202,255,0,.55), transparent 40%),
      radial-gradient(circle at 22% 82%, rgba(155,92,255,.55), transparent 42%),
      linear-gradient(135deg,#ffd6f2,#fff7c2 55%,#c9fff0);
    background-attachment:fixed;
    position:relative;
  }
  /* sparkle / star texture */
  body::before{
    content:"";
    position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:
      radial-gradient(2px 2px at 20% 30%, #fff 50%, transparent),
      radial-gradient(2px 2px at 70% 60%, #fff 50%, transparent),
      radial-gradient(1.5px 1.5px at 40% 80%, #fff 50%, transparent),
      radial-gradient(1.5px 1.5px at 85% 25%, #fff 50%, transparent),
      radial-gradient(2px 2px at 55% 15%, #fff 50%, transparent);
    opacity:.7;
    animation:twinkle 3s ease-in-out infinite alternate;
  }
  @keyframes twinkle{from{opacity:.3}to{opacity:.85}}

  .wrap{
    position:relative;z-index:2;
    max-width:920px;margin:0 auto;
    padding:28px 18px 80px;
    text-align:center;
  }

  .kicker{
    display:inline-block;
    background:var(--ink);color:var(--yellow);
    font-family:'Fredoka',sans-serif;font-weight:700;
    letter-spacing:.5px;font-size:clamp(.75rem,3vw,1rem);
    padding:8px 16px;border-radius:999px;
    transform:rotate(-3deg);
    border:3px solid #fff;
    box-shadow:4px 4px 0 var(--hot);
    margin-bottom:18px;
  }

  h1{
    font-family:'Bagel Fat One',cursive;
    font-size:clamp(2.4rem,11vw,5.5rem);
    line-height:.95;
    color:#fff;
    -webkit-text-stroke:3px var(--ink);
    text-stroke:3px var(--ink);
    text-shadow:5px 6px 0 var(--hot), 9px 11px 0 rgba(22,0,51,.25);
    margin-bottom:6px;
    transform:rotate(-1.5deg);
  }
  h1 .fl{color:var(--yellow);}
  .sub{
    font-family:'Fredoka',sans-serif;font-weight:700;
    font-size:clamp(1rem,4vw,1.45rem);
    color:var(--ink);
    margin-bottom:26px;
  }
  .sub b{background:var(--cyan);padding:2px 10px;border-radius:8px;border:2px solid var(--ink);box-shadow:2px 2px 0 var(--ink);white-space:nowrap;}

  /* photo stickers */
  .photos{
    display:flex;justify-content:center;align-items:center;
    gap:clamp(12px,5vw,46px);
    margin:8px 0 30px;
    flex-wrap:wrap;
  }
  .sticker{
    background:#fff;padding:10px 10px 14px;border-radius:18px;
    border:4px solid var(--ink);
    box-shadow:7px 7px 0 var(--ink);
    position:relative;
    transition:transform .25s ease;
  }
  .sticker img{
    display:block;width:clamp(120px,34vw,190px);height:auto;
    border-radius:10px;object-fit:cover;
  }
  .sticker.one{transform:rotate(-6deg);}
  .sticker.two{transform:rotate(6deg);}
  .sticker.one:hover{transform:rotate(-2deg) scale(1.05);}
  .sticker.two:hover{transform:rotate(2deg) scale(1.05);}
  .tag{
    position:absolute;top:-16px;left:50%;transform:translateX(-50%) rotate(-4deg);
    font-family:'Bagel Fat One',cursive;font-size:.85rem;
    background:var(--hot);color:#fff;padding:4px 12px;border-radius:999px;
    border:3px solid var(--ink);white-space:nowrap;
    box-shadow:2px 2px 0 var(--ink);
  }
  .sticker.two .tag{background:var(--lime);color:var(--ink);}

  /* countdown */
  .timer{
    display:flex;justify-content:center;gap:clamp(8px,2.5vw,18px);
    flex-wrap:wrap;margin:6px 0 8px;
  }
  .cell{
    background:#fff;border:4px solid var(--ink);border-radius:20px;
    box-shadow:6px 6px 0 var(--purple);
    padding:14px clamp(10px,3vw,22px);
    min-width:clamp(74px,20vw,110px);
    transform:rotate(var(--r,0deg));
  }
  .cell:nth-child(1){--r:-2deg;box-shadow:6px 6px 0 var(--hot);}
  .cell:nth-child(2){--r:2deg;box-shadow:6px 6px 0 var(--cyan);}
  .cell:nth-child(3){--r:-2deg;box-shadow:6px 6px 0 var(--lime);}
  .cell:nth-child(4){--r:2deg;box-shadow:6px 6px 0 var(--purple);}
  .num{
    font-family:'Bagel Fat One',cursive;
    font-size:clamp(2rem,9vw,3.6rem);line-height:1;color:var(--ink);
    font-variant-numeric:tabular-nums;
  }
  .lbl{
    font-family:'Fredoka',sans-serif;font-weight:700;
    text-transform:uppercase;letter-spacing:1px;
    font-size:clamp(.6rem,2.5vw,.8rem);
    margin-top:6px;color:var(--hot);
  }

  .pop{
    margin-top:22px;font-family:'Fredoka',sans-serif;font-weight:700;
    font-size:clamp(.95rem,3.5vw,1.2rem);color:var(--ink);
  }
  .pop .when{background:var(--yellow);padding:2px 10px;border-radius:8px;border:2px solid var(--ink);box-shadow:2px 2px 0 var(--ink);}

  .done{
    display:none;margin-top:18px;
    font-family:'Bagel Fat One',cursive;
    font-size:clamp(1.6rem,7vw,3rem);color:var(--hot);
    text-shadow:3px 3px 0 var(--ink);
    animation:wiggle .5s ease-in-out infinite alternate;
  }
  @keyframes wiggle{from{transform:rotate(-3deg)}to{transform:rotate(3deg)}}

  .footer{
    margin-top:44px;font-family:'Fredoka',sans-serif;font-weight:500;
    font-size:.8rem;color:var(--ink);opacity:.7;
  }

  /* floating emoji blobs */
  .blob{position:fixed;font-size:2.2rem;z-index:1;opacity:.9;pointer-events:none;animation:float 7s ease-in-out infinite;}
  .blob.b1{top:14%;left:6%;animation-delay:0s;}
  .blob.b2{top:24%;right:7%;animation-delay:1.2s;}
  .blob.b3{bottom:18%;left:9%;animation-delay:2.1s;}
  .blob.b4{bottom:12%;right:10%;animation-delay:.6s;}
  @keyframes float{0%,100%{transform:translateY(0) rotate(-6deg)}50%{transform:translateY(-18px) rotate(8deg)}}

  /* confetti canvas */
  #confetti{position:fixed;inset:0;pointer-events:none;z-index:5;display:none;}
</style>
</head>
<body>
  <span class="blob b1">🌴</span>
  <span class="blob b2">🔥</span>
  <span class="blob b3">💅</span>
  <span class="blob b4">✨</span>

  <div class="wrap">
    <span class="kicker">⏳ official countdown ⏳</span>
    <h1>helen's personal<br><span class="fl">fl</span> countdown</h1>
    <p class="sub">we are SO back · touchdown <b>june 30 · 6:51 PM ET</b> 🌴🔥</p>

    <div class="photos">
      <figure class="sticker one">
        <span class="tag">it's giving 😄</span>
        <img src="helen-1.png" alt="helen" />
      </figure>
      <figure class="sticker two">
        <span class="tag">certified HOT 🔥</span>
        <img src="helen-2.png" alt="helen being hot" />
      </figure>
    </div>

    <div class="timer" id="timer" aria-live="polite">
      <div class="cell"><div class="num" id="d">--</div><div class="lbl">days</div></div>
      <div class="cell"><div class="num" id="h">--</div><div class="lbl">hours</div></div>
      <div class="cell"><div class="num" id="m">--</div><div class="lbl">mins</div></div>
      <div class="cell"><div class="num" id="s">--</div><div class="lbl">secs</div></div>
    </div>

    <p class="pop">until helen lands in florida 🛬 <span class="when">06/30 · 6:51 PM ET</span></p>
    <div class="done" id="done">SHE'S IN FLORIDA BABYYY 🌴🎉💅</div>

    <p class="footer">made with 💖 for helen · no thoughts just vibes</p>
  </div>

  <canvas id="confetti"></canvas>

<script>
  // Target: June 30, 2026 6:51 PM US Eastern (EDT = UTC-4 in late June)
  const TARGET = new Date("2026-06-30T18:51:00-04:00").getTime();

  const $ = id => document.getElementById(id);
  const pad = n => String(n).padStart(2,"0");

  function tick(){
    const now = Date.now();
    let diff = TARGET - now;

    if (diff <= 0){
      $("timer").style.display = "none";
      $("done").style.display = "block";
      launchConfetti();
      clearInterval(loop);
      return;
    }

    const day = 86400000, hr = 3600000, min = 60000, sec = 1000;
    const d = Math.floor(diff / day);  diff -= d*day;
    const h = Math.floor(diff / hr);   diff -= h*hr;
    const m = Math.floor(diff / min);  diff -= m*min;
    const s = Math.floor(diff / sec);

    $("d").textContent = d;
    $("h").textContent = pad(h);
    $("m").textContent = pad(m);
    $("s").textContent = pad(s);
  }

  const loop = setInterval(tick, 1000);
  tick();

  // ---- confetti when it hits zero ----
  let confettiRunning = false;
  function launchConfetti(){
    if (confettiRunning) return;
    confettiRunning = true;
    const cv = $("confetti");
    cv.style.display = "block";
    const ctx = cv.getContext("2d");
    function size(){ cv.width = innerWidth; cv.height = innerHeight; }
    size(); addEventListener("resize", size);
    const colors = ["#ff2d95","#ffe300","#caff00","#00e5ff","#9b5cff"];
    const bits = Array.from({length:160}, () => ({
      x: Math.random()*cv.width,
      y: Math.random()*-cv.height,
      r: 6 + Math.random()*8,
      c: colors[Math.floor(Math.random()*colors.length)],
      vy: 2 + Math.random()*4,
      vx: -2 + Math.random()*4,
      rot: Math.random()*Math.PI,
      vr: -0.2 + Math.random()*0.4
    }));
    (function draw(){
      ctx.clearRect(0,0,cv.width,cv.height);
      bits.forEach(b=>{
        b.y += b.vy; b.x += b.vx; b.rot += b.vr;
        if (b.y > cv.height + 20){ b.y = -20; b.x = Math.random()*cv.width; }
        ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(b.rot);
        ctx.fillStyle = b.c; ctx.fillRect(-b.r/2,-b.r/2,b.r,b.r*0.6);
        ctx.restore();
      });
      requestAnimationFrame(draw);
    })();
  }
</script>
</body>
</html>
